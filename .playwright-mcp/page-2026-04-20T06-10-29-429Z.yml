          - generic [ref=e93]: (opens in a new window)
        - text: does for REST, and that you would still obviously need some way of making that data accessible to your application.
      - paragraph [ref=e94]: I couldn’t have been more wrong.
      - generic [ref=e95]:
        - heading "Client State vs. Server State" [level=2] [ref=e96]
