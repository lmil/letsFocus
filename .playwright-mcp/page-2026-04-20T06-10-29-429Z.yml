        - text: has been asked a lot.
      - paragraph [ref=e90]: I distinctly remember not understanding what this was all about. Why would some data fetching library replace your global state manager? What does one even have to do with the other?
      - paragraph [ref=e91]:
        - text: I was under the impression that GraphQL clients like Apollo would only fetch the data for you, similar to what e.g.
        - link "axios (opens in a new window)" [ref=e92] [cursor=pointer]:
