      - paragraph [ref=e100]:
        - text: What Apollo gives you is not just the ability to describe which data you want and to fetch that data, it also comes with a
        - emphasis [ref=e101]: cache
        - text: for that server data. This means that you can just use the same
        - code [ref=e102]: useQuery
        - text: hook in multiple components, and it will only fetch data once and then subsequently return it from the cache.
      - paragraph [ref=e103]:
        - text: This sounds
        - emphasis [ref=e104]: very
        - text: familiar with what we, and probably many other teams as well, have mainly been using
        - code [ref=e105]: redux
        - text: "for: Fetch data from the server and make it available everywhere."
      - paragraph [ref=e106]:
        - text: So it seems that we have always been treating this
        - emphasis [ref=e107]: server state
        - text: like any other
        - emphasis [ref=e108]: client state
        - text: . Except that when it comes to
        - emphasis [ref=e109]: server state
        - text: "(think: A list of articles that you fetch, the details of a User you want to display, …), your app does not own it. We have only borrowed it to display the most recent version of it on the screen for the user. It is the server who owns the data."
      - paragraph [ref=e110]:
        - text: To me, that introduced a paradigm shift in how to think about data. If we can leverage the cache to display data that we do not own, there isn’t really much left that is real client state that
        - emphasis [ref=e111]: also
        - text: needs to be made available to the whole app. That made me understand why many think that Apollo can replace redux in lots of instances.
