                          - paragraph [ref=f2e624]: Thanks for the writeup. I however had a question about the usage of querycache as local state. I'm using use query to load the data into querycache and for every update in the data (due to user interaction) I'm using setquerydata inside onMutate for optimistic updates. In another section of my app where the updates are more frequent and in the interest of reducing server calls, I'm loading the cache into local state (with useffect), and then batching the changes made to local state and sending them to server. In this case, when doing the mutation, I'm also using setquerydata to make the exact changes to cache. Can you let me know if these approaches are recommended or if theres a better way to solve this problem? Thanks!
