          - text: Tanner Linsley
          - generic [ref=e124]: (opens in a new window)
        - text: in late 2019, React Query takes the good parts of Apollo and brings them to REST. It works with any function that returns a Promise and embraces the
        - emphasis [ref=e125]: stale-while-revalidate
        - text: caching strategy. The library operates on sane defaults that try to keep your data as fresh as possible while at the same time showing data to the user as early as possible, making it feel near instant at times and thus providing a great UX. On top of that, it is also very flexible and lets you customize various settings for when the defaults are not enough.
