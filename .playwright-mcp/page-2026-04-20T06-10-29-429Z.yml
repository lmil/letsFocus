      - paragraph [ref=e117]: I have never had the chance to use GraphQL. We have an existing REST API, don’t really experience problems with over-fetching, it just works, etc. Clearly, there aren’t enough pain points for us to warrant a switch, especially given that you’d also have to adapt the backend, which isn’t quite so simple.
      - paragraph [ref=e118]: Yet I still envied the simplicity of how data fetching can look like on the frontend, including the handling of loading and error states. If only there were something similar in React for REST APIs…
