n\\nconst queryCache = new QueryCache();\\n\\nexport default function App() {\\n return (\\n \\u003CReactQueryCacheProvider queryCache={queryCache}\\u003E\\n \\u003CExample \\u002F\\u003E\\n \\u003C\\u002FReactQueryCacheProvider\\u003E\\n );\\n}\\n\\nfunction Example() {\\n const [isOpen, setIsOpen] = React.useState(false);\\n\\n return (\\n \\u003Cdiv\\u003E\\n \\u003Cul\\u003E\\n \\u003Cli\\u003EOpen the Modal\\u003C\\u002Fli\\u003E\\n \\u003Cli\\u003E\\n It will load a random number and show it, but not put it to state\\n \\u003C\\u002Fli\\u003E\\n \\u003Cli\\u003ERe-focus the window - the value will still update\\u003C\\u002Fli\\u003E\\n \\u003Cli\\u003E\\n Change the value: Your draft now takes precedence and the query is\\n disabled\\n \\u003C\\u002Fli\\u003E\\n \\u003Cli\\u003E\\n Close the modal and open it again: No loading spinner, value will\\n update\\n \\u003C\\u002Fli\\u003E\\n \\u003C\\u002Ful\\u003E\\n \\u003Cbutton type=\\\"button\\\" onClick={() =\\u003E setIsOpen(true)}\\u003E\\n Open\\n \\u003C\\u002Fbutton\\u003E\\n {isOpen && \\u003CModal close={() =\\u003E setIsOpen(false)} \\u002F\\u003E}\\n \\u003CReactQueryDevtools\\n initialIsOpen\\n panelProps={{ style: { height: 250 } }}\\n \\u002F\\u003E\\n \\u003C\\u002Fdiv\\u003E\\n );\\n}\\n\\nconst sleep = (time) =\\u003E new Promise((resolve) =\\u003E setTimeout(resolve, time));\\n\\nconst useRandomValue = () =\\u003E {\\n const [draft, setDraft] = React.useState(undefined);\\n const { data, ...queryInfo } = useQuery(\\n \\\"random\\\",\\n async () =\\u003E {\\n await sleep(1000);\\n return Promise.resolve(String(Math.random()));\\n },\\n {\\n enabled: typeof draft === \\\"undefined\\\"\\n }\\n );\\n\\n return {\\n value: draft ?? data,\\n setDraft,\\n queryInfo\\n };\\n};\\n\\nfunction Modal({ close }) {\\n const {\\n value,\\n setDraft,\\n queryInfo: { isLoading, error }\\n } = useRandomValue();\\n\\n return (\\n \\u003Cdiv\\n style={{\\n position: \\\"fixed\\\",\\n top: \\\"0\\\",\\n left: \\\"0\\\",\\n paddingTop: \\\"10px\\\",\\n width: \\\"100%\\\",\\n height: \\\"100%\\\",\\n backgroundColor: \\\"rgba(0,0,0,0.4)\\\"\\n }}\\n \\u003E\\n \\u003Cdiv\\n style={{\\n display: \\\"flex\\\",\\n justifyContent: \\\"center\\\",\\n width: \\\"80%\\\",\\n height: \\\"25vh\\\",\\n margin: \\\"auto\\\",\\n backgroundColor: \\\"white\\\"\\n }}\\n \\u003E\\n \\u003Cdiv\\u003E\\n {isLoading && \\\"Loading...\\\"}\\n {error && \\\"error\\\"}\\n {value !== undefined && (\\n \\u003Cinput\\n type=\\\"text\\\"\\n value={value}\\n onChange={(event) =\\u003E setDraft(event.target.value)}\\n \\u002F\\u003E\\n )}\\n \\u003Cspan style={{ cursor: \\\"pointer\\\" }} onClick={close}\\u003E\\n ×\\n \\u003C\\u002Fspan\\u003E\\n \\u003C\\u002Fdiv\\u003E\\n \\u003C\\u002Fdiv\\u003E\\n \\u003C\\u002Fdiv\\u003E\\n );\\n}\\n\\nconst rootElement = document.getElementById(\\\"root\\\");\\nReactDOM.render(\\u003CApp \\u002F\\u003E, rootElement);\\n\",\"id\":\"mod_7xvZo4X1P6qpE2hCjDFYpm\",\"is_binary\":false,\"title\":\"index.js\",\"sha\":null,\"inserted_at\":\"2020-11-03T07:55:54\",\"updated_at\":\"2023-07-14T10:37:31\",\"upload_id\":null,\"shortid\":\"By9c78hTdD\",\"source_id\":\"src_3UkuQiWnLFEKpi92wyXLzG\",\"directory_shortid\":\"Hke5QIhTdw\"}],\"external_resources\":[],\"restrictions\":{\"free_plan_editing_restricted\":false,\"live_sessions_restricted\":true},\"feature_flags\":{\"comments\":false,\"container_lsp\":false},\"original_git_commit_sha\":\"5d56cf5c28f3e8a55183d45e31d3e5bc88a36f57\",\"view_count\":4898703,\"version\":53,\"user_liked\":false,\"forked_template_sandbox\":{\"alias\":\"tannerlinsley-react-query-simple-1wpf6\",\"id\":\"1wpf6\",\"title\":\"tannerlinsley\\u002Freact-query: simple\",\"template\":\"create-react-app\",\"inserted_at\":\"2020-11-02T14:35:08\",\"updated_at\":\"2022-05-29T18:09:07\",\"git\":{\"path\":\"examples\\u002Fsimple\",\"branch\":\"master\",\"repo\":\"react-query\",\"username\":\"tannerlinsley\",\"commit_sha\":\"9f6c992feecb4694758f8767063d8ad89d842c3c